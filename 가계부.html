<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="theme-color" content="#4F46E5">
<title>가계부</title>
<style>
:root {
  --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,.07);--border-md:rgba(0,0,0,.13);
  --text:#1a1a1a;--sub:#888;--hint:#bbb;
  --green:#16a34a;--green-bg:#f0fdf4;--green-lt:#dcfce7;
  --red:#dc2626;--red-bg:#fef2f2;--red-lt:#fee2e2;
  --blue:#4F46E5;--blue-bg:#eef2ff;--blue-lt:#e0e7ff;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-lt:#fef3c7;
  --r:14px;--rs:9px;--rx:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:.5px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--hint)}
.nb.active{color:var(--blue)}
.ni{font-size:20px}
.page{display:none;max-width:480px;margin:0 auto;padding:16px 14px 90px}
.page.active{display:block}
.card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:14px;margin-bottom:12px}
.ct{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:12px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mb{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);padding:4px 10px}
.ml{font-size:18px;font-weight:700}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--surface);border-radius:var(--rs);border:.5px solid var(--border);padding:10px 8px;text-align:center}
.sl{font-size:11px;color:var(--sub);margin-bottom:3px}
.sv{font-size:15px;font-weight:700}
.br{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.br:last-child{margin-bottom:0}
.bt{display:flex;justify-content:space-between;align-items:baseline}
.bn{font-size:13px;font-weight:500}
.bv{font-size:12px;color:var(--sub)}
.bv span{font-weight:600}
.gb{height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.gf{height:100%;border-radius:99px;transition:width .4s}
.go{background:var(--green)}.gw{background:var(--amber)}.gr{background:var(--red)}
.cr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cr:last-child{margin-bottom:0}
.cn{font-size:12px;font-weight:500;min-width:62px}
.cb{flex:1}
.cv{font-size:11px;color:var(--sub);text-align:right;min-width:68px}
.cv b{color:var(--text)}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:14px}
.tbtn{padding:9px 4px;border:.5px solid var(--border-md);border-radius:var(--rs);background:transparent;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)}
.tbtn.ao{background:var(--red-bg);color:var(--red);border-color:rgba(220,38,38,.2)}
.tbtn.ai{background:var(--green-bg);color:var(--green);border-color:rgba(22,163,74,.2)}
.tbtn.am{background:var(--blue-bg);color:var(--blue);border-color:rgba(79,70,229,.2)}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:10px 11px;font-size:15px;border:.5px solid var(--border-md);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
.field textarea{resize:none;min-height:58px;line-height:1.6}
.field.dis{opacity:.3;pointer-events:none}
.sl2{font-size:12px;color:var(--sub);margin-bottom:7px;font-weight:700}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.cbtn{padding:9px 4px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:11px;cursor:pointer;color:var(--text);text-align:center;line-height:1.4}
.cbtn.sel{border-color:rgba(79,70,229,.4);background:var(--blue-bg);color:var(--blue);font-weight:700}
.sgrid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.sbtn{padding:9px 6px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:12px;cursor:pointer;color:var(--text);text-align:center}
.sbtn.sel{border-color:rgba(79,70,229,.4);background:var(--blue-bg);color:var(--blue);font-weight:700}
.nbox{background:var(--bg);border:.5px solid var(--border-md);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.nhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.nlbl{font-size:12px;font-weight:700;color:var(--sub)}
.nclr{font-size:11px;color:var(--hint);background:none;border:none;cursor:pointer}
.nprev{margin-top:8px;padding:9px 11px;background:var(--surface);border-radius:var(--rx);border-left:2px solid var(--blue);font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-all;display:none}
.chip{display:inline-block;cursor:pointer;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;margin:3px 3px 0 0}
.ca{background:var(--blue-lt);color:var(--blue)}
.cd{background:var(--green-lt);color:var(--green)}
.cc{background:var(--amber-lt);color:var(--amber)}
.add-btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;background:var(--blue);color:#fff}
.add-btn:active{opacity:.85}
.entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.ei{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.edesc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{font-size:11px;color:var(--sub);margin-top:2px}
.eamt{font-size:14px;font-weight:700;flex-shrink:0}
.ap{color:var(--green)}.am2{color:var(--red)}.av{color:var(--blue)}
.del{background:none;border:none;font-size:14px;cursor:pointer;color:var(--hint);padding:4px}
.empty{text-align:center;padding:30px;color:var(--hint);font-size:13px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)}
.srow:last-child{border-bottom:none}
.sname{font-size:13px}
.sright{text-align:right}
.samt{font-size:14px;font-weight:700}
.sgoal{font-size:11px;color:var(--sub);margin-top:1px}
.div{height:.5px;background:var(--border);margin:10px 0}
.trow{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.tlbl{font-size:13px;color:var(--sub)}
.tval{font-size:15px;font-weight:700}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;margin-left:4px}
.to{background:var(--red-lt);color:var(--red)}
.tw{background:var(--amber-lt);color:var(--amber)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:20px 16px 40px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--hint)}
.ftab{padding:6px 12px;border:.5px solid var(--border-md);border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);white-space:nowrap;flex-shrink:0}
.ftab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.memo-box{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:12px;margin-bottom:12px}
.memo-box textarea{width:100%;border:none;background:transparent;font-size:13px;font-family:inherit;color:var(--text);resize:none;outline:none;line-height:1.7;min-height:80px}
.memo-box textarea::placeholder{color:var(--hint)}
.memo-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.memo-lbl{font-size:12px;font-weight:700;color:var(--sub)}
.memo-saved{font-size:10px;color:var(--hint)}
.sheets-box{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:12px;margin-bottom:12px}
.sheets-hd{display:flex;justify-content:space-between;align-items:center}
.sheets-title{font-size:12px;font-weight:700;color:var(--sub);display:flex;align-items:center;gap:6px}
.sheets-dot{width:7px;height:7px;border-radius:50%;background:var(--hint)}
.sheets-dot.on{background:var(--green)}
.sheets-body{display:none;margin-top:10px}
.sheets-body.open{display:block}
.sheets-tog{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer}
.sec-div{display:flex;align-items:center;gap:7px;margin:10px 0 7px}
.sec-div span{font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap}
.sec-div::after{content:'';flex:1;height:.5px;background:var(--border)}
.brow-wrap{margin-bottom:7px}
.brow-wrap:last-child{margin-bottom:0}
.brow-hd{display:flex;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;gap:6px;width:100%}
.brow-main{flex:1}
.barr{font-size:10px;color:var(--hint);margin-left:5px;transition:transform .2s;flex-shrink:0;line-height:1}
.barr.open{transform:rotate(180deg)}
.brow-detail{display:none;margin-top:5px;padding:7px 9px;background:var(--bg);border-radius:var(--rx)}
.brow-detail.open{display:block}
.srow2{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:.5px solid var(--border)}
.srow2:last-child{border-bottom:none}
.srow2 .sl3{color:var(--sub)}.srow2 .sv2{font-weight:600}
.go{background:#4ade80}.gw{background:#fb923c}.gr{background:#f87171}
.bamt{font-size:10px;color:var(--sub);text-align:right;margin-top:2px}
</style>
</head>
<body>

<div class="page active" id="page-home">
  <div class="month-nav">
    <button class="mb" onclick="changeMonth(-1)">‹</button>
    <div class="ml" id="month-label"></div>
    <button class="mb" onclick="changeMonth(1)">›</button>
  </div>
  <div class="sgrid">
    <div class="sc"><div class="sl">수입</div><div class="sv" style="color:var(--green)" id="h-in">₩0</div></div>
    <div class="sc"><div class="sl">지출</div><div class="sv" style="color:var(--red)" id="h-out">₩0</div></div>
    <div class="sc"><div class="sl">잔액</div><div class="sv" id="h-bal">₩0</div></div>
  </div>

  <!-- 메모장 -->
  <div class="memo-box">
    <div class="memo-hd">
      <span class="memo-lbl">📝 메모</span>
      <span class="memo-saved" id="memo-saved"></span>
    </div>
    <textarea id="quick-memo" placeholder="이달 메모, 할 일, 체크리스트 등 자유롭게..."></textarea>
  </div>

  <!-- 구글 시트 연동 -->
  <div class="sheets-box">
    <div class="sheets-hd">
      <div class="sheets-title">
        <div class="sheets-dot" id="sheets-dot"></div>
        📊 구글 시트 연동
      </div>
      <button class="sheets-tog" onclick="toggleSheets()">설정 ▾</button>
    </div>
    <div class="sheets-body" id="sheets-body">
      <div class="field" style="margin-top:10px">
        <label>시트 ID</label>
        <input type="text" id="sheet-id" placeholder="스프레드시트 URL의 /d/ 뒤 ID"/>
      </div>
      <div class="field">
        <label>Apps Script URL</label>
        <input type="text" id="script-url" placeholder="https://script.google.com/macros/s/.../exec"/>
      </div>
      <button onclick="saveSheetConfig()" style="padding:9px 16px;border:.5px solid var(--blue);border-radius:var(--rs);background:var(--blue-bg);color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;width:100%">저장 & 연결</button>
    </div>
  </div>
  <div class="card"><div class="ct" style="display:flex;justify-content:space-between;align-items:center">📊 카테고리 예산<div style="display:flex;gap:6px"><button onclick="expandAll('budget')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 펴기</button><button onclick="collapseAll('budget')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 접기</button></div></div><div id="budget-list"></div></div>
  <div class="card"><div class="ct" style="display:flex;justify-content:space-between;align-items:center">💳 카드 현황<div style="display:flex;gap:6px"><button onclick="expandAll('card')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 펴기</button><button onclick="collapseAll('card')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 접기</button></div></div><div id="card-list"></div></div>
</div>

<div class="page" id="page-input">
  <div class="nbox">
    <div class="nhd"><span class="nlbl">알림 붙여넣기</span><button class="nclr" onclick="clearNotif()">지우기</button></div>
    <textarea id="notif-input" placeholder="카드 알림 붙여넣으면 금액/날짜/카드 자동인식 👇" oninput="onNotif(this.value)" style="width:100%;background:transparent;border:none;font-size:13px;font-family:inherit;resize:none;min-height:54px;color:var(--text);outline:none"></textarea>
    <div class="nprev" id="nprev"></div>
  </div>
  <div class="card" style="padding:14px">
    <div class="type-row">
      <button class="tbtn ao" id="tb-out" onclick="setType('지출')">지출</button>
      <button class="tbtn" id="tb-in" onclick="setType('수입')">수입</button>
      <button class="tbtn" id="tb-mv" onclick="setType('이동')">이동</button>
    </div>
    <div class="field"><label>날짜</label><input type="date" id="f-date"/></div>
    <div><div class="sl2">대분류</div><div class="cgrid" id="major-grid"></div>
    <div id="sub-sec" style="display:none"><div class="sl2">소분류</div><div class="sgrid2" id="sub-grid"></div></div></div>
    <div class="field"><label>내용</label><input type="text" id="f-memo" placeholder="메모 (선택)"/></div>
    <div class="field"><label>금액</label><input type="number" id="f-amount" placeholder="0" inputmode="numeric"/></div>
    <div class="field" id="f-in-wrap"><label>입금계좌</label><select id="f-in-acct"></select></div>
    <div class="field" id="f-out-wrap"><label>출금계좌</label><select id="f-out-acct"></select></div>
    <button class="add-btn" onclick="addEntry()">+ 추가하기</button>
  </div>
</div>

<div class="page" id="page-history">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:16px;font-weight:700" id="hist-month"></div>
    <button onclick="exportXLSX()" style="padding:7px 14px;font-size:12px;border:.5px solid var(--border-md);border-radius:var(--rx);background:transparent;color:var(--sub);cursor:pointer">엑셀 저장</button>
  </div>
  <!-- 필터 -->
  <div style="display:flex;gap:6px;margin-bottom:6px;overflow-x:auto;padding-bottom:2px">
    <button class="ftab on" onclick="setFilter('전체',this)">전체</button>
    <button class="ftab" onclick="setFilter('지출',this)">지출</button>
    <button class="ftab" onclick="setFilter('수입',this)">수입</button>
    <button class="ftab" onclick="setFilter('이동',this)">이동</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px">
    <button class="ftab" id="cf-롯카" onclick="setCardFilter('롯카',this)">롯카</button>
    <button class="ftab" id="cf-삼카" onclick="setCardFilter('삼카',this)">삼카</button>
    <button class="ftab" id="cf-신카" onclick="setCardFilter('신카',this)">신카</button>
    <button class="ftab" id="cf-국카k" onclick="setCardFilter('국카k',this)">국카k</button>
    <button class="ftab" id="cf-국카1" onclick="setCardFilter('국카1',this)">국카1</button>
  </div>
  <!-- 검색 -->
  <div style="margin-bottom:10px">
    <input id="hist-search" type="text" placeholder="🔍 내용·카테고리 검색"
      oninput="renderHist()"
      style="width:100%;padding:9px 12px;font-size:13px;border:.5px solid var(--border-md);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:inherit"/>
  </div>
  <div id="entry-list"><div class="empty">아직 내역이 없어요</div></div>
</div>

<div class="page" id="page-balance">
  <!-- 현금 총액 -->
  <div class="sgrid" style="margin-bottom:12px">
    <div class="sc" style="grid-column:span 2"><div class="sl">현금·예금 합계</div><div class="sv" style="color:var(--blue)" id="bal-cash-total">₩0</div></div>
    <div class="sc"><div class="sl">카드 미결제</div><div class="sv" style="color:var(--red)" id="bal-debt-total">₩0</div></div>
  </div>

  <!-- 초기잔고 설정 -->
  <div class="card">
    <div class="ct" style="display:flex;justify-content:space-between;align-items:center">
      ⚙️ 초기 잔고 설정
      <button onclick="toggleInitBal()" style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer" id="init-bal-tog">설정 ▾</button>
    </div>
    <div id="init-bal-body" style="display:none">
      <div style="font-size:11px;color:var(--sub);margin-bottom:10px;line-height:1.7">25년 말 기준 잔고 한 번만 입력 → 이후 자동계산</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="init-bal-inputs"></div>
      <button onclick="saveInitBal()" style="margin-top:10px;width:100%;padding:10px;border:.5px solid var(--blue);border-radius:var(--rs);background:var(--blue-bg);color:var(--blue);font-size:13px;font-weight:700;cursor:pointer">저장</button>
    </div>
  </div>

  <!-- 현금 계좌 -->
  <div class="card">
    <div class="ct">💰 현금·예금 계좌</div>
    <div id="bal-cash"></div>
  </div>

  <!-- 카드 미결제 -->
  <div class="card">
    <div class="ct" style="color:var(--red)">💳 카드 미결제</div>
    <div id="bal-card-debt"></div>
    <div class="div"></div>
    <div class="trow"><span class="tlbl">전세대출 (장기)</span><span id="bal-longdebt" class="tval" style="color:var(--red)">₩0</span></div>
  </div>
</div>

<!-- 자산 페이지 -->
<div class="page" id="page-asset">
  <!-- 자산 요약 -->
  <div class="sgrid" style="margin-bottom:12px">
    <div class="sc"><div class="sl">투자 자산</div><div class="sv" style="color:var(--blue)" id="ast-invest-total">₩0</div></div>
    <div class="sc"><div class="sl">부동산</div><div class="sv" style="color:var(--blue)" id="ast-estate-total">₩0</div></div>
    <div class="sc"><div class="sl">저축률</div><div class="sv" id="ast-sav-rate">0%</div></div>
  </div>

  <!-- 이달 납입 현황 -->
  <div class="card">
    <div class="ct" style="display:flex;justify-content:space-between;align-items:center">

function goPage(n,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');btn.classList.add('active');
  if(n==='home')renderHome();if(n==='history')renderHist();if(n==='balance')renderBalance();if(n==='asset')renderAsset();
}
function changeMonth(d){
  const[y,m]=curMon.split('-').map(Number);
  const nd=new Date(y,m-1+d,1);
  curMon=nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
  renderHome();renderHist();
}
function me(){return entries.filter(e=>e.date&&e.date.startsWith(curMon));}

function renderHome(){
  const[y,m]=curMon.split('-');
  document.getElementById('month-label').textContent=`${y}년 ${parseInt(m)}월`;
  document.getElementById('hist-month').textContent=`${y}년 ${parseInt(m)}월 내역`;
  const es=me();
  const inc=es.filter(e=>e.type==='수입').reduce((s,e)=>s+e.amount,0);
  const exp=es.filter(e=>e.type==='지출').reduce((s,e)=>s+e.amount,0);
  const bal=inc-exp;
  document.getElementById('h-in').textContent=fmt(inc);
  document.getElementById('h-out').textContent=fmt(exp);
  const bEl=document.getElementById('h-bal');
  bEl.textContent=(bal<0?'-':'')+fmt(bal);
  bEl.style.color=bal>=0?'var(--green)':'var(--red)';

  const majT={};const subT={};
  es.filter(e=>e.type==='지출').forEach(e=>{
    majT[e.major]=(majT[e.major]||0)+e.amount;
    const k=e.major+'__'+e.sub;subT[k]=(subT[k]||0)+e.amount;
  });

  // 고정비/비고정비 분류
  const FIXED_CATS=['🏠 주거비','🗃️ 보험','📞 통신비','🍀 곗돈','☀️ 엄마(고정)'];
  const VAR_CATS=['☀️ 엄마(건강)','🍽️ 식비','🛒 생활용품','👗 꾸밈비','👩‍🎓 자기계발','😷 건강','🚌 교통비','🎁 경조사','📺 문화생활','✔️ 기타'];

  // 엄마 분리: 고정(엄마건강 제외) / 비고정(엄마건강)
  const MAMA_FIXED_SUBS=['엄마대출원금','엄마대출이자','엄마생활비','엄마보험(삼성생명)','엄마보험(DB 손해)','엄마보험(보람상조)','엄마보험(라이나)','엄마핸드폰(LGU+)','엄마핸드폰(삼케)'];
  const mamaFixed=es.filter(e=>e.type==='지출'&&e.major==='☀️ 엄마'&&MAMA_FIXED_SUBS.includes(e.sub)).reduce((s,e)=>s+e.amount,0);
  const mamaVar=es.filter(e=>e.type==='지출'&&e.major==='☀️ 엄마'&&e.sub==='엄마건강').reduce((s,e)=>s+e.amount,0);

  function budgetRow(catKey, displayName, budget, spent, subsWithBudget, id){
    const p=budget>0?Math.min((spent/budget)*100,100):0;
    const ov=budget>0&&spent>budget,wn=budget>0&&spent>budget*.8;
    const gc=ov?'gr':wn?'gw':'go';
    const tagHtml=ov?'<span class="tag to">초과</span>':wn?'<span class="tag tw">주의</span>':'';
    const amtColor=ov?'var(--red)':wn?'var(--amber)':'var(--text)';
    const remain=budget-spent;
    const remainTxt=remain>=0?'잔액 '+fmtK(remain):'초과 '+fmtK(-remain);
    const remainColor=remain>=0?'var(--green)':'var(--red)';
    // 소분류: [이름, 실제금액, 예산] 형태로 전부 표시
    const subHtml=subsWithBudget&&subsWithBudget.length>0?subsWithBudget.map(([nm,sv,sb])=>{
      const sp2=sb>0?Math.min((sv/sb)*100,100):0;
      const so=sb>0&&sv>sb;
      const sc2=so?'var(--red)':sv>0?'var(--text)':'var(--hint)';
      return`<div class="srow2" style="align-items:center">
        <span class="sl3" style="flex:1">${nm}</span>
        <span style="font-size:11px;font-weight:600;color:${sc2};margin-right:4px">${sv>0?fmt(sv):'0'}</span>
        ${sb>0?`<span style="font-size:10px;color:var(--hint)">/ ${fmt(sb)}</span>`:``}
        ${sb>0?`<div class="gb" style="width:24px;margin-left:4px;flex-shrink:0"><div class="gf ${so?'gr':'go'}" style="width:${sp2}%"></div></div>`:''}
      </div>`;
    }).join(''):'';
    return`<div class="brow-wrap" data-group="budget">
      <div class="brow-hd" onclick="toggleBrow('${id}')">
        <span class="bn" style="flex:1;min-width:0">${displayName}${tagHtml}</span>

function addEntry(){

function renderHist(){
  const list=document.getElementById('entry-list');
  const searchEl=document.getElementById('hist-search');
  const q=(searchEl?searchEl.value.trim().toLowerCase():'');
  let es=me();
  // 타입 필터 (AND)
  if(histFilter!=='전체') es=es.filter(e=>e.type===histFilter);
  // 카드 필터 (AND)
  if(histCardFilter){
    const keys=CARD_GROUP_KEYS[histCardFilter]||[];
    es=es.filter(e=>keys.includes(e.outAcct)||keys.includes(e.inAcct));
  }
  // 검색
  if(q)es=es.filter(e=>
    (e.major+e.sub+e.memo+e.inAcct+e.outAcct).toLowerCase().includes(q)
  );
  if(!es.length){list.innerHTML='<div class="empty">내역이 없어요</div>';return;}
  // 날짜별 그룹
  const byDate={};
  es.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  list.innerHTML=Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const dayEs=byDate[date];
    const dayTotal=dayEs.reduce((s,e)=>s+(e.type==='지출'?-e.amount:e.type==='수입'?e.amount:0),0);
    const rows=dayEs.map(e=>{
      const ii=e.type==='수입',im=e.type==='이동';
      const bg=ii?'var(--green-bg)':im?'var(--blue-bg)':'var(--red-bg)';
      const cl=ii?'ap':im?'av':'am2';const sg=ii?'+':im?'↔':'-';
      const icon=e.major?e.major.split(' ')[0]:'📌';
      const desc=e.major?e.major.split(' ').slice(1).join(' '):e.memo||'이동';
      return`<div class="entry"><div class="ei" style="background:${bg}">${icon}</div><div class="einfo"><div class="edesc">${desc}${e.sub?' · '+e.sub:''}${e.memo?' · '+e.memo:''}</div><div class="emeta">${e.outAcct?' · '+e.outAcct:''}${e.inAcct?' · '+e.inAcct:''}</div></div><div class="eamt ${cl}">${sg}${fmt(e.amount)}</div><button class="del" style="color:var(--sub)" onclick="openEditModal(${e.id})">✏️</button><button class="del" onclick="delEntry(${e.id})">✕</button></div>`;
    }).join('');
    const [,dm]=date.split('-'); const dd=date.split('-')[2];
    return`<div style="margin-bottom:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--border-md)">
        <span style="font-size:12px;font-weight:700;color:var(--sub)">${parseInt(dm)}월 ${parseInt(dd)}일</span>
        <span style="font-size:11px;font-weight:600;color:${dayTotal>=0?'var(--green)':'var(--red)'}">${dayTotal>=0?'+':''}${fmtK(dayTotal)}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function calcBalances(){
  const init=getInitBal();
  const allIn={},allOut={};
  entries.forEach(e=>{
    if(e.type==='이동'){
      if(e.inAcct)allIn[e.inAcct]=(allIn[e.inAcct]||0)+e.amount;
      if(e.outAcct)allOut[e.outAcct]=(allOut[e.outAcct]||0)+e.amount;
    }
    if(e.type==='지출'&&e.outAcct)allOut[e.outAcct]=(allOut[e.outAcct]||0)+e.amount;
    if(e.type==='수입'&&e.inAcct)allIn[e.inAcct]=(allIn[e.inAcct]||0)+e.amount;
  });
  function curBal(key){return(init[key]||0)+(allIn[key]||0)-(allOut[key]||0);}
  return {curBal};
}

function renderBalance(){
  const {curBal}=calcBalances();
  const cashAccs=ACCOUNTS_DEF.filter(a=>a.group==='cash');
  const debtAccs=ACCOUNTS_DEF.filter(a=>a.group==='debt');
  const longDebtAccs=ACCOUNTS_DEF.filter(a=>a.group==='longdebt');

  const cashTotal=cashAccs.reduce((s,a)=>s+curBal(a.key),0);
  const debtTotal=debtAccs.reduce((s,a)=>s+Math.min(0,curBal(a.key)),0);
  const longDebtTotal=longDebtAccs.reduce((s,a)=>s+curBal(a.key),0);

  document.getElementById('bal-cash-total').textContent=fmt(cashTotal);
  document.getElementById('bal-debt-total').textContent=fmt(Math.abs(debtTotal));

  // 현금 계좌 목록
  document.getElementById('bal-cash').innerHTML=
    cashAccs.map(a=>{
      const v=curBal(a.key);
      return`<div class="srow">
        <span class="sname">${a.label}</span>
        <span class="samt" style="color:${v>=0?'var(--text)':'var(--red)'}">${v<0?'-':''}${fmt(Math.abs(v))}</span>
      </div>`;
    }).join('')+
    `<div class="div"></div>
    <div class="trow"><span class="tlbl">합계</span><span class="tval" style="color:var(--blue)">${fmt(cashTotal)}</span></div>`;

  // 카드 미결제
  document.getElementById('bal-card-debt').innerHTML=
    debtAccs.map(a=>{
      const v=curBal(a.key);
      const debt=Math.abs(Math.min(0,v));
      return`<div class="srow">
        <span class="sname">${a.label}</span>
        <span class="samt" style="color:${debt>0?'var(--red)':'var(--hint)'}">${debt>0?fmt(debt):'-'}</span>
      </div>`;
    }).join('');

  document.getElementById('bal-longdebt').textContent=fmt(Math.abs(longDebtTotal));
}

function renderAsset(){
  const {curBal}=calcBalances();
  const investAccs=ACCOUNTS_DEF.filter(a=>a.group==='invest');
  const estateAccs=ACCOUNTS_DEF.filter(a=>a.group==='estate');

  const investTotal=investAccs.reduce((s,a)=>s+curBal(a.key),0);
  const estateTotal=estateAccs.reduce((s,a)=>s+curBal(a.key),0);

  document.getElementById('ast-invest-total').textContent=fmt(investTotal);
  document.getElementById('ast-estate-total').textContent=fmt(estateTotal);

  // 저축률 계산 (전체 기간 수입 대비 이동)
  const allEntryInc=entries.filter(e=>e.type==='수입').reduce((s,e)=>s+e.amount,0);
  const allSav=entries.filter(e=>e.type==='이동'&&investAccs.some(a=>a.key===e.inAcct)).reduce((s,e)=>s+e.amount,0);
  const savRate=allEntryInc>0?Math.round(allSav/allEntryInc*100):0;
  const rateEl=document.getElementById('ast-sav-rate');
  rateEl.textContent=savRate+'%';
  rateEl.style.color=savRate>=30?'var(--green)':'var(--amber)';

  // 이달 납입 현황
  const es=me();
  const [y,m]=curMon.split('-');
  document.getElementById('ast-month-lbl').textContent=`${y}년 ${parseInt(m)}월`;

  let monthSavSum=0;
  const monthlyHtml=SAVE_GOALS.map(g=>{
    const monthAmt=entries.filter(e=>e.date&&e.date.startsWith(curMon)&&e.type==='이동'&&e.memo&&e.memo.includes(g.mk)).reduce((s,e)=>s+e.amount,0);
    monthSavSum+=monthAmt;
    const ok=g.g===0||monthAmt>=g.g;
    const pct=g.g>0?Math.min(Math.round(monthAmt/g.g*100),100):0;
    const gc=ok?'go':monthAmt>0?'gw':'';
    return`<div class="brow-wrap">
      <div style="display:flex;align-items:center;gap:4px">
        <span class="bn" style="flex:1">${g.n}</span>
        <span style="font-size:10px;color:var(--sub);white-space:nowrap">${fmt(monthAmt)}${g.g>0?' / '+fmt(g.g):''}</span>
        ${g.g>0?`<span style="font-size:10px;font-weight:700;min-width:26px;text-align:right;color:${ok?'var(--green)':'var(--amber)'}">${pct}%</span>`:''}
        ${g.g>0?`<div class="gb" style="width:32px"><div class="gf ${gc}" style="width:${pct}%"></div></div>`:''}
        <span style="font-size:11px">${ok?'✅':'📌'}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('ast-monthly').innerHTML=monthlyHtml;
  document.getElementById('ast-sav-sum').textContent=fmt(monthSavSum);

  // 월별 저축 추이 (막대 차트 — 텍스트 기반)
  const months=['2026-01','2026-02','2026-03'].filter(m=>entries.some(e=>e.date&&e.date.startsWith(m)));
  const trendHtml=months.map(mon=>{
    const monInc=entries.filter(e=>e.date&&e.date.startsWith(mon)&&e.type==='수입').reduce((s,e)=>s+e.amount,0);
    const monSav=entries.filter(e=>e.date&&e.date.startsWith(mon)&&e.type==='이동'&&investAccs.some(a=>a.key===e.inAcct)).reduce((s,e)=>s+e.amount,0);
    const monRate=monInc>0?Math.round(monSav/monInc*100):0;
    const [,mm]=mon.split('-');
    const barW=Math.min(monRate*2,100);
    const col=monRate>=30?'var(--green)':monRate>=15?'var(--amber)':'var(--red)';
    return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border)">
      <span style="font-size:12px;font-weight:600;min-width:28px">${parseInt(mm)}월</span>
      <div style="flex:1;height:8px;background:var(--bg);border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${col};border-radius:99px"></div>
      </div>
      <span style="font-size:11px;font-weight:700;color:${col};min-width:32px">${monRate}%</span>
      <span style="font-size:11px;color:var(--sub);min-width:60px;text-align:right">${fmtK(monSav)}</span>
    </div>`;
  }).join('');
  document.getElementById('ast-trend').innerHTML=trendHtml||'<div class="empty">데이터 없음</div>';

  // 누적 저축·투자 계좌
  document.getElementById('ast-invest').innerHTML=
    investAccs.map(a=>{
      const v=curBal(a.key);
      return`<div class="srow">
        <div>
          <div class="sname">${a.label}</div>
          ${a.goal>0?`<div style="font-size:10px;color:var(--sub)">월 목표 ${fmt(a.goal)}</div>`:''}
        </div>
        <span class="samt" style="color:var(--blue)">${fmt(v)}</span>
      </div>`;
    }).join('')+
    `<div class="div"></div>
    <div class="trow"><span class="tlbl">투자 합계</span><span class="tval" style="color:var(--blue)">${fmt(investTotal)}</span></div>`;

  // 부동산
  document.getElementById('ast-estate').innerHTML=
    estateAccs.map(a=>{
      const v=curBal(a.key);
      return`<div class="srow"><span class="sname">${a.label}</span><span class="samt" style="color:var(--blue)">${fmt(v)}</span></div>`;
    }).join('');
}

function parseNotif(v){
  const r={};
  const am=v.match(/([0-9][0-9,\.]+)\s*원/)||v.match(/[^잔]\s([0-9]{3,}[,\.][0-9]{3})/);
  if(am){const raw=am[1].replace(/[,\.]/g,'');if(parseInt(raw)>0)r.amount=parseInt(raw);}
  const dm=v.match(/(\d{1,2})\/(\d{2})/);
  if(dm)r.date=`${new Date().getFullYear()}-${dm[1].padStart(2,'0')}-${dm[2]}`;
  for(const m of CMAP){for(const k of m.k){if(v.includes(k)){r.card=m.v;break;}}if(r.card)break;}
  return r;
}
function onNotif(v){
  const p=document.getElementById('nprev');
  if(!v.trim()){p.style.display='none';return;}
  const r=parseNotif(v);
  let h=`<div style="white-space:pre-wrap;word-break:break-all;font-size:12px;color:var(--sub);margin-bottom:8px">${v.trim()}</div><div>`;
  if(r.amount)h+=`<span class="chip ca" onclick="apAmt(${r.amount})">💰 ${r.amount.toLocaleString()}원 ↓</span>`;
  if(r.date)h+=`<span class="chip cd" onclick="apDate('${r.date}')">📅 ${r.date} ↓</span>`;
  if(r.card)h+=`<span class="chip cc" onclick="apCard('${r.card}')">💳 ${r.card} ↓</span>`;
  if(!r.amount&&!r.date&&!r.card)h+='<span style="font-size:12px;color:var(--hint)">인식 항목 없음</span>';
  h+='</div>';p.style.display='block';p.innerHTML=h;
}
function apAmt(a){document.getElementById('f-amount').value=a;showToast(`${a.toLocaleString()}원 입력`);}
function apDate(d){document.getElementById('f-date').value=d;showToast(`${d} 입력`);}
function apCard(c){
  const sel=cType==='수입'?document.getElementById('f-in-acct'):document.getElementById('f-out-acct');
  for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===c){sel.value=c;showToast(`${c} 선택`);return;}}
  showToast(`${c} 목록에 없어요`);
}
function clearNotif(){document.getElementById('notif-input').value='';const p=document.getElementById('nprev');p.style.display='none';p.innerHTML='';}

function exportXLSX(){
  const es=me();if(!es.length){showToast('내역이 없어요');return;}
  const rows=[['날짜','구분','대분류','소분류','내용','금액','입금계좌','출금계좌','9열'],...es.map(e=>[e.date,e.type,e.major,e.sub,e.memo,e.type==='지출'?-e.amount:e.amount,e.inAcct,e.outAcct,''])];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:5},{wch:14},{wch:16},{wch:20},{wch:12},{wch:18},{wch:18},{wch:8}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'가계부');
  XLSX.writeFile(wb,`가계부_${curMon}.xlsx`);
}

  const b=document.getElementById('sheets-body');
  const btn=document.querySelector('.sheets-tog');

function saveSheetConfig(){
  const sid=document.getElementById('sheet-id').value.trim();
  const surl=document.getElementById('script-url').value.trim();
  if(!sid||!surl){showToast('ID와 URL을 입력해주세요');return;}
  try{localStorage.setItem('sheetId',sid);localStorage.setItem('scriptUrl',surl);}catch(e){}
  updateSheetStatus();
  showToast('✅ 연동 설정 저장됐어요!');
  toggleSheets();
}
function updateSheetStatus(){
  const sid=localStorage.getItem('sheetId')||'';
  const surl=localStorage.getItem('scriptUrl')||'';
  const dot=document.getElementById('sheets-dot');
  if(!dot)return;
  if(sid&&surl){dot.classList.add('on');}else{dot.classList.remove('on');}
  if(sid)document.getElementById('sheet-id').value=sid;
  if(surl)document.getElementById('script-url').value=surl;
}

// 메모 자동저장
let memoTimer;
function initMemo(){
  const ta=document.getElementById('quick-memo');
  if(!ta)return;
  try{const saved=localStorage.getItem('quickMemo');if(saved)ta.value=saved;}catch(e){}
  ta.addEventListener('input',()=>{
    clearTimeout(memoTimer);
    document.getElementById('memo-saved').textContent='저장 중...';
    memoTimer=setTimeout(()=>{
      try{localStorage.setItem('quickMemo',ta.value);}catch(e){}
      document.getElementById('memo-saved').textContent='저장됨 ✓';
      setTimeout(()=>{const s=document.getElementById('memo-saved');if(s)s.textContent='';},2000);
    },800);
  });
}

let editingId = null;

function openEditModal(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('edit-date').value = e.date;
  document.getElementById('edit-amount').value = e.amount;
  document.getElementById('edit-memo').value = e.memo || '';
  // 계좌 셀렉트 빌드
  buildSel(document.getElementById('edit-out-acct'));
  buildSel(document.getElementById('edit-in-acct'));
  document.getElementById('edit-out-acct').value = e.outAcct || '';
  document.getElementById('edit-in-acct').value = e.inAcct || '';
  document.getElementById('edit-modal').classList.remove('hidden');
}

function closeEditModal(ev) {
  if (ev && ev.target !== document.getElementById('edit-modal')) return;
  document.getElementById('edit-modal').classList.add('hidden');
  editingId = null;
}

function saveEdit() {
  if (!editingId) return;
  const idx = entries.findIndex(x => x.id === editingId);
  if (idx === -1) return;
  const amt = parseInt(document.getElementById('edit-amount').value);
  if (!amt || amt <= 0) { showToast('금액을 확인해주세요'); return; }
  entries[idx].date = document.getElementById('edit-date').value;
  entries[idx].amount = amt;
  entries[idx].memo = document.getElementById('edit-memo').value;
  entries[idx].outAcct = document.getElementById('edit-out-acct').value;
  entries[idx].inAcct = document.getElementById('edit-in-acct').value;
  try { localStorage.setItem('gb_v3', JSON.stringify(entries)); } catch(e) {}
  document.getElementById('edit-modal').classList.add('hidden');
  editingId = null;
  showToast('✅ 수정됐어요!');
  renderHist();
  renderHome();
}

function deleteAndClose() {
  if (!editingId) return;
  entries = entries.filter(e => e.id !== editingId);
  try { localStorage.setItem('gb_v3', JSON.stringify(entries)); } catch(e) {}
  document.getElementById('edit-modal').classList.add('hidden');
  editingId = null;
  showToast('삭제됐어요');
  renderHist();
  renderHome();
}

function toggleBrow(id){
  const det=document.getElementById('det-'+id);
  const arr=document.getElementById('arr-'+id);
  if(!det)return;
  det.classList.toggle('open');
  if(arr)arr.classList.toggle('open');

function expandAll(group){
  document.querySelectorAll('.brow-wrap[data-group="'+group+'"]').forEach(w=>{
    const det=w.querySelector('.brow-detail');
    const arr=w.querySelector('.barr');
    if(det)det.classList.add('open');
    if(arr)arr.classList.add('open');
  });

function collapseAll(group){
  document.querySelectorAll('.brow-wrap[data-group="'+group+'"]').forEach(w=>{
    const det=w.querySelector('.brow-detail');
    const arr=w.querySelector('.barr');
    if(det)det.classList.remove('open');
    if(arr)arr.classList.remove('open');
  });
}
function fmt(n){return'₩'+Math.abs(n).toLocaleString('ko-KR');}
function fmtK(n){return n>=10000?(n/10000).toFixed(n%10000===0?0:1)+'만':n.toLocaleString();}
let tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000);}

setType('지출');renderHome();updateSheetStatus();initMemo();
