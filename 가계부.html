<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="theme-color" content="#4F46E5">
<title>가계부</title>
<style>
:root{
  --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,.07);--border-md:rgba(0,0,0,.13);
  --text:#1a1a1a;--sub:#888;--hint:#bbb;
  --green:#16a34a;--green-bg:#f0fdf4;--green-lt:#dcfce7;
  --red:#dc2626;--red-bg:#fef2f2;--red-lt:#fee2e2;
  --blue:#4F46E5;--blue-bg:#eef2ff;--blue-lt:#e0e7ff;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-lt:#fef3c7;
  --r:14px;--rs:9px;--rx:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:.5px solid var(--border);
  display:grid;grid-template-columns:repeat(6,1fr);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-size:10px;color:var(--hint)}
.nb.active{color:var(--blue)}
.ni{font-size:20px}
.page{display:none;max-width:480px;margin:0 auto;padding:16px 14px 90px}
.page.active{display:block}
.card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:14px;margin-bottom:12px}
.ct{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:12px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)}
.srow:last-child{border-bottom:none}
.sname{font-size:13px}.samt{font-size:14px;font-weight:700}
.div{height:.5px;background:var(--border);margin:10px 0}
.trow{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.tlbl{font-size:13px;color:var(--sub)}.tval{font-size:15px;font-weight:700}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;margin-left:4px}
.to{background:var(--red-lt);color:var(--red)}.tw{background:var(--amber-lt);color:var(--amber)}
.empty{text-align:center;padding:30px;color:var(--hint);font-size:13px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mb{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);padding:4px 10px}
.ml{font-size:18px;font-weight:700}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--surface);border-radius:var(--rs);border:.5px solid var(--border);padding:10px 8px;text-align:center}
.sl{font-size:11px;color:var(--sub);margin-bottom:3px}.sv{font-size:15px;font-weight:700}
.memo-box{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:12px;margin-bottom:12px}
.memo-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.memo-lbl{font-size:12px;font-weight:700;color:var(--sub)}.memo-saved{font-size:10px;color:var(--hint)}
.memo-box textarea{width:100%;border:none;background:transparent;font-size:13px;font-family:inherit;
  color:var(--text);resize:none;outline:none;line-height:1.7;min-height:70px}
.memo-box textarea::placeholder{color:var(--hint)}
.sec-div{display:flex;align-items:center;gap:7px;margin:10px 0 7px}
.sec-div span{font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap}
.sec-div::after{content:'';flex:1;height:.5px;background:var(--border)}
.brow-wrap{margin-bottom:7px}
.brow-hd{display:flex;align-items:center;cursor:pointer;gap:6px;width:100%}
.barr{font-size:10px;color:var(--hint);margin-left:5px;transition:transform .2s;flex-shrink:0;line-height:1}
.barr.open{transform:rotate(180deg)}
.brow-detail{display:none;margin-top:5px;padding:7px 9px;background:var(--bg);border-radius:var(--rx)}
.brow-detail.open{display:block}
.srow2{display:flex;padding:3px 0;font-size:11px;border-bottom:.5px solid var(--border);align-items:center}
.srow2:last-child{border-bottom:none}
.gb{height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.gf{height:100%;border-radius:99px;transition:width .4s}
.go{background:#4ade80}.gw{background:#fb923c}.gr{background:#f87171}
.bn{font-size:13px;font-weight:500}
.nbox{background:var(--bg);border:.5px solid var(--border-md);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.nhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.nlbl{font-size:12px;font-weight:700;color:var(--sub)}
.nclr{font-size:11px;color:var(--hint);background:none;border:none;cursor:pointer}
.nprev{margin-top:8px;padding:9px 11px;background:var(--surface);border-radius:var(--rx);
  border-left:2px solid var(--blue);font-size:13px;line-height:1.7;display:none}
.chip{display:inline-block;cursor:pointer;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;margin:3px 3px 0 0}
.ca{background:var(--blue-lt);color:var(--blue)}
.cd{background:var(--green-lt);color:var(--green)}
.cc{background:var(--amber-lt);color:var(--amber)}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:14px}
.tbtn{padding:9px 4px;border:.5px solid var(--border-md);border-radius:var(--rs);background:transparent;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)}
.tbtn.ao{background:var(--red-bg);color:var(--red);border-color:rgba(220,38,38,.2)}
.tbtn.ai{background:var(--green-bg);color:var(--green);border-color:rgba(22,163,74,.2)}
.tbtn.am{background:var(--blue-bg);color:var(--blue);border-color:rgba(79,70,229,.2)}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;padding:10px 11px;font-size:15px;border:.5px solid var(--border-md);
  border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:inherit;-webkit-appearance:none}
.sl2{font-size:12px;color:var(--sub);margin-bottom:7px;font-weight:700}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.cbtn{padding:9px 4px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:11px;cursor:pointer;color:var(--text);text-align:center;line-height:1.4}
.cbtn.sel{border-color:rgba(79,70,229,.4);background:var(--blue-bg);color:var(--blue);font-weight:700}
.sgrid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.sbtn{padding:9px 6px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:12px;cursor:pointer;color:var(--text);text-align:center}
.sbtn.sel{border-color:rgba(79,70,229,.4);background:var(--blue-bg);color:var(--blue);font-weight:700}
.add-btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;background:var(--blue);color:#fff}
.add-btn:active{opacity:.85}
.acct-wrap{position:relative}
.acct-input{width:100%;padding:10px 11px;font-size:15px;border:.5px solid var(--border-md);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:inherit}
.acct-drop{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:.5px solid var(--border-md);border-radius:var(--rs);z-index:50;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.acct-drop.open{display:block}
.acct-item{padding:10px 12px;font-size:14px;cursor:pointer;border-bottom:.5px solid var(--border)}
.acct-item:last-child{border-bottom:none}.acct-item:active{background:var(--bg)}
.entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.ei{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.edesc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{font-size:11px;color:var(--sub);margin-top:2px}
.eamt{font-size:14px;font-weight:700;flex-shrink:0}
.ap{color:var(--green)}.am2{color:var(--red)}.av{color:var(--blue)}
.del{background:none;border:none;font-size:14px;cursor:pointer;color:var(--hint);padding:4px}
.ftab{padding:6px 12px;border:.5px solid var(--border-md);border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);white-space:nowrap;flex-shrink:0}
.ftab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:20px 16px 40px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--hint)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page active" id="page-home">
  <div class="month-nav">
    <button class="mb" onclick="changeMonth(-1)">&#8249;</button>
    <div class="ml" id="month-label"></div>
    <button class="mb" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="sgrid">
    <div class="sc"><div class="sl">수입</div><div class="sv" style="color:var(--green)" id="h-in">&#8361;0</div></div>
    <div class="sc"><div class="sl">지출</div><div class="sv" style="color:var(--red)" id="h-out">&#8361;0</div></div>
    <div class="sc"><div class="sl">잔액</div><div class="sv" id="h-bal">&#8361;0</div></div>
  </div>
  <div class="memo-box">
    <div class="memo-hd"><span class="memo-lbl">&#128221; 메모</span><span class="memo-saved" id="memo-saved"></span></div>
    <textarea id="quick-memo" placeholder="이달 메모, 할 일 등 자유롭게..."></textarea>
  </div>
  <div class="card">
    <div class="ct" style="display:flex;justify-content:space-between;align-items:center">
      &#128202; 카테고리 예산
      <div style="display:flex;gap:6px">
        <button onclick="expandAll('budget')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 펴기</button>
        <button onclick="collapseAll('budget')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 접기</button>
      </div>
    </div>
    <div id="budget-list"></div>
  </div>
  <div class="card">
    <div class="ct" style="display:flex;justify-content:space-between;align-items:center">
      &#128179; 카드 현황
      <div style="display:flex;gap:6px">
        <button onclick="expandAll('card')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 펴기</button>
        <button onclick="collapseAll('card')" style="font-size:10px;padding:3px 8px;border:.5px solid var(--border-md);border-radius:99px;background:transparent;color:var(--sub);cursor:pointer">전체 접기</button>
      </div>
    </div>
    <div id="card-list"></div>
  </div>
</div>
<div class="page" id="page-input">
  <div class="nbox">
    <div class="nhd"><span class="nlbl">알림 붙여넣기</span><button class="nclr" onclick="clearNotif()">지우기</button></div>
    <textarea id="notif-input" placeholder="카드 알림 붙여넣으면 금액/날짜/카드 자동인식" oninput="onNotif(this.value)"
      style="width:100%;background:transparent;border:none;font-size:13px;font-family:inherit;resize:none;min-height:54px;color:var(--text);outline:none"></textarea>
    <div class="nprev" id="nprev"></div>
  </div>
  <div class="card" style="padding:14px">
    <div class="type-row">
      <button class="tbtn ao" id="tb-out" onclick="setType('지출')">지출</button>
      <button class="tbtn" id="tb-in" onclick="setType('수입')">수입</button>
      <button class="tbtn" id="tb-mv" onclick="setType('이동')">이동</button>
    </div>
    <div class="field"><label>날짜</label><input type="date" id="f-date"/></div>
    <div>
      <div class="sl2">대분류</div><div class="cgrid" id="major-grid"></div>
      <div id="sub-sec" style="display:none"><div class="sl2">소분류</div><div class="sgrid2" id="sub-grid"></div></div>
    </div>
    <div class="field"><label>내용</label><input type="text" id="f-memo" placeholder="메모 (선택)"/></div>
    <div class="field"><label>금액</label><input type="number" id="f-amount" placeholder="0" inputmode="numeric"/></div>
    <div class="field" id="f-in-wrap"><label>입금계좌</label>
      <div class="acct-wrap">
        <input class="acct-input" id="f-in-acct" type="text" placeholder="계좌 검색 또는 입력" autocomplete="off"
          oninput="acctSearch('in',this.value)" onfocus="acctSearch('in',this.value)" onblur="setTimeout(function(){closeAcctDrop('in')},200)"/>
        <div class="acct-drop" id="drop-in"></div>
      </div>
    </div>
    <div class="field" id="f-out-wrap"><label>출금계좌</label>
      <div class="acct-wrap">
        <input class="acct-input" id="f-out-acct" type="text" placeholder="계좌 검색 또는 입력" autocomplete="off"
          oninput="acctSearch('out',this.value)" onfocus="acctSearch('out',this.value)" onblur="setTimeout(function(){closeAcctDrop('out')},200)"/>
        <div class="acct-drop" id="drop-out"></div>
      </div>
    </div>
    <button class="add-btn" onclick="addEntry()">+ 추가하기</button>
  </div>
</div>
<div class="page" id="page-history">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:16px;font-weight:700" id="hist-month"></div>
    <button onclick="exportXLSX()" style="padding:7px 14px;font-size:12px;border:.5px solid var(--border-md);border-radius:var(--rx);background:transparent;color:var(--sub);cursor:pointer">엑셀 저장</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:6px;overflow-x:auto;padding-bottom:2px">
    <button class="ftab on" onclick="setFilter('전체',this)">전체</button>
    <button class="ftab" onclick="setFilter('지출',this)">지출</button>
    <button class="ftab" onclick="setFilter('수입',this)">수입</button>
    <button class="ftab" onclick="setFilter('이동',this)">이동</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px">
    <button class="ftab" id="cf-lk" onclick="setCardFilter('롯카',this)">롯카</button>
    <button class="ftab" id="cf-sk" onclick="setCardFilter('삼카',this)">삼카</button>
    <button class="ftab" id="cf-sk2" onclick="setCardFilter('신카',this)">신카</button>
    <button class="ftab" id="cf-gk" onclick="setCardFilter('국카k',this)">국카k</button>
    <button class="ftab" id="cf-g1" onclick="setCardFilter('국카1',this)">국카1</button>
  </div>
  <div style="margin-bottom:10px">
    <input id="hist-search" type="text" placeholder="검색 (내용/카테고리)" oninput="renderHist()"
      style="width:100%;padding:9px 12px;font-size:13px;border:.5px solid var(--border-md);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:inherit"/>
  </div>
  <div id="entry-list"><div class="empty">아직 내역이 없어요</div></div>
</div>
<div class="page" id="page-balance">
  <div class="sgrid" style="margin-bottom:12px">
    <div class="sc" style="grid-column:span 2"><div class="sl">현금/예금 합계</div><div class="sv" style="color:var(--blue)" id="bal-cash-total">&#8361;0</div></div>
    <div class="sc"><div class="sl">카드 미결제</div><div class="sv" style="color:var(--red)" id="bal-debt-total">&#8361;0</div></div>
  </div>
  <div class="card">
    <div class="ct" style="display:flex;justify-content:space-between;align-items:center">
      초기 잔고 설정
      <button onclick="toggleInitBal()" style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer" id="init-bal-tog">설정 &#9660;</button>
    </div>
    <div id="init-bal-body" style="display:none">
      <div style="font-size:11px;color:var(--sub);margin-bottom:10px;line-height:1.7">25년 말 기준 잔고 입력</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="init-bal-inputs"></div>
      <button onclick="saveInitBal()" style="margin-top:10px;width:100%;padding:10px;border:.5px solid var(--blue);border-radius:var(--rs);background:var(--blue-bg);color:var(--blue);font-size:13px;font-weight:700;cursor:pointer">저장</button>
    </div>
  </div>
  <div class="card"><div class="ct">&#128181; 현금/예금</div><div id="bal-cash"></div></div>
  <div class="card">
    <div class="ct">&#128179; 카드 미결제</div>
    <div id="bal-card-debt"></div>
    <div class="div"></div>
    <div class="trow"><span class="tlbl">장기부채 (전세대출 등)</span><span class="tval" style="color:var(--red)" id="bal-longdebt">&#8361;0</span></div>
  </div>
</div>
<div class="page" id="page-asset">
  <div class="sgrid" style="margin-bottom:12px">
    <div class="sc" style="grid-column:span 2"><div class="sl">투자/저축 합계</div><div class="sv" style="color:var(--blue)" id="ast-invest-total">&#8361;0</div></div>
    <div class="sc"><div class="sl">부동산</div><div class="sv" style="color:var(--blue)" id="ast-estate-total">&#8361;0</div></div>
  </div>
  <div class="card">
    <div class="ct" style="display:flex;justify-content:space-between;align-items:center">
      이달 저축 현황
      <div><span id="ast-month-lbl" style="font-size:11px;color:var(--sub);margin-right:6px"></span><span style="font-size:13px;font-weight:700;color:var(--blue)" id="ast-sav-sum"></span></div>
    </div>
    <div id="ast-monthly"></div>
  </div>
  <div class="card">
    <div class="ct">저축률 추이</div>
    <div class="trow" style="margin-bottom:8px"><span class="tlbl">전체 저축률</span><span class="tval" id="ast-sav-rate">0%</span></div>
    <div id="ast-trend"></div>
  </div>
  <div class="card"><div class="ct">투자/저축 계좌</div><div id="ast-invest"></div></div>
  <div class="card"><div class="ct">부동산</div><div id="ast-estate"></div></div>
</div>
<div class="page" id="page-setup">
  <div class="card">
    <div class="ct" style="display:flex;align-items:center;gap:7px">
      &#128202; 구글 시트 연동
      <div id="sheets-dot" style="width:7px;height:7px;border-radius:50%;background:var(--hint)"></div>
    </div>
    <div class="field"><label>시트 ID</label>
      <input type="text" id="sheet-id2" placeholder="스프레드시트 URL의 /d/ 뒤 ID"/>
    </div>
    <div class="field"><label>Apps Script URL</label>
      <input type="text" id="script-url2" placeholder="https://script.google.com/macros/s/.../exec"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button onclick="saveSheetConfig()" style="padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer">저장 &amp; 연결</button>
      <button onclick="loadFromSheet()" style="padding:11px;background:var(--green-bg);color:var(--green);border:.5px solid var(--green-lt);border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer">시트에서 불러오기</button>
    </div>

function goPage(n,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+n).classList.add('active');
  btn.classList.add('active');
  try{localStorage.setItem('lastTab',n);}catch(e){}
  if(n==='home')renderHome();
  else if(n==='history'){if(isConfigured())renderHist();else document.getElementById('entry-list').innerHTML='<div class="empty">\uC124\uC815\uD0ED\uC5D0\uC11C \uD30C\uC77C\uC744 \uC62C\uB824\uC8FC\uC138\uC694</div>';}
  else if(n==='balance'){if(isConfigured())renderBalance();else document.getElementById('page-balance').innerHTML='<div class="empty">\uC124\uC815\uD0ED\uC5D0\uC11C \uD30C\uC77C\uC744 \uC62C\uB824\uC8FC\uC138\uC694</div>';}
  else if(n==='asset'){if(isConfigured())renderAsset();else document.getElementById('page-asset').innerHTML='<div class="empty">\uC124\uC815\uD0ED\uC5D0\uC11C \uD30C\uC77C\uC744 \uC62C\uB824\uC8FC\uC138\uC694</div>';}

function changeMonth(d){
  var p=curMon.split('-'),y=parseInt(p[0]),m=parseInt(p[1]);
  var nd=new Date(y,m-1+d,1);
  curMon=nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
  renderHome();
  if(document.getElementById('entry-list'))renderHist();
}

  var hm=document.getElementById('hist-month');

    document.getElementById('card-list').innerHTML=nc;
    document.getElementById('h-in').textContent='\u20A90';
    document.getElementById('h-out').textContent='\u20A90';
    document.getElementById('h-bal').textContent='\u20A90';
    return;
  }
  var es=me();
  var inc=es.filter(function(e){return e.type==='수입';}).reduce(function(s,e){return s+e.amount;},0);
  var exp=es.filter(function(e){return e.type==='지출';}).reduce(function(s,e){return s+e.amount;},0);

  ['식비','생활용품','꾸밈비','자기계발','건강','교통비','경조사','문화생활','기타'].forEach(function(k){

function renderHist(){
  var list=document.getElementById('entry-list');
  var q=(document.getElementById('hist-search')?document.getElementById('hist-search').value:'').trim().toLowerCase();
  var es=me();
  if(histFilter!=='\uC804\uCCB4')es=es.filter(function(e){return e.type===histFilter;});
  if(histCardFilter){var ks=CARD_GROUP_KEYS[histCardFilter]||[];es=es.filter(function(e){return ks.indexOf(e.outAcct)>=0||ks.indexOf(e.inAcct)>=0;});}
  if(q)es=es.filter(function(e){return (e.major+e.sub+e.memo+e.inAcct+e.outAcct).toLowerCase().indexOf(q)>=0;});
  if(!es.length){list.innerHTML='<div class="empty">\uB0B4\uC5ED\uC774 \uC5C6\uC5B4\uC694</div>';return;}
  var byDate={};es.forEach(function(e){if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  list.innerHTML=Object.keys(byDate).sort(function(a,b){return b.localeCompare(a);}).map(function(date){
    var dayEs=byDate[date];
    var dayTotal=dayEs.reduce(function(s,e){return s+(e.type==='\uC9C0\uCD9C'?-e.amount:e.type==='\uC218\uC785'?e.amount:0);},0);
    var rows=dayEs.map(function(e){
      var ii=e.type==='\uC218\uC785',im=e.type==='\uC774\uB3D9';
      var bg=ii?'var(--green-bg)':im?'var(--blue-bg)':'var(--red-bg)';
      var cl=ii?'ap':im?'av':'am2';var sg=ii?'+':im?'<->':'-';
      var icon=e.major?e.major.split(' ')[0]:'';
      var desc=e.major?e.major.split(' ').slice(1).join(' '):(e.memo||'\uC774\uB3D9');
      var meta=[e.memo,e.outAcct&&('\uCD9C: '+e.outAcct),e.inAcct&&('\uC785: '+e.inAcct)].filter(Boolean).join(' / ');
      return '<div class="entry">'
        +'<div class="ei" style="background:'+bg+'">'+icon+'</div>'
        +'<div class="einfo"><div class="edesc">'+desc+(e.sub?' · '+e.sub:'')+'</div>'
        +'<div class="emeta">'+meta+'</div></div>'
        +'<div class="eamt '+cl+'">'+sg+fmt(e.amount)+'</div>'
        +'<button class="del" onclick="openEditModal(\''+e.id+'\')">&#9998;</button>'
        +'<button class="del" onclick="if(confirm(\'\uC0AD\uC81C\uD560\uAE4C\uC694?\'))delEntry(\''+e.id+'\')">&#10005;</button>'
        +'</div>';
    }).join('');
    var dm=date.split('-')[1],dd=date.split('-')[2];
    return '<div style="margin-bottom:4px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--border-md)">'
      +'<span style="font-size:12px;font-weight:700;color:var(--sub)">'+parseInt(dm)+'\uC6D4 '+parseInt(dd)+'\uC77C</span>'
      +'<span style="font-size:11px;font-weight:600;color:'+(dayTotal>=0?'var(--green)':'var(--red)')+'">'+( dayTotal>=0?'+':'')+fmtK(dayTotal)+'</span>'
      +'</div>'+rows+'</div>';
  }).join('');
}

function getInitBal(){try{var s=localStorage.getItem('initBal');if(s)return JSON.parse(s);}catch(e){}var d={};ACCTS_DEF.forEach(function(a){d[a.key]=0;});return d;}
function saveInitBal(){
  var d={};ACCTS_DEF.forEach(function(a){var el=document.getElementById('ibal-'+a.key.replace(/[^a-zA-Z0-9]/g,'_'));if(el)d[a.key]=parseInt(el.value.replace(/,/g,''))||0;});

    }).join('');

function calcBalances(){
  var init=getInitBal(),allIn={},allOut={};
  entries.forEach(function(e){
    if(e.type==='\uC218\uC785'&&e.inAcct)allIn[e.inAcct]=(allIn[e.inAcct]||0)+e.amount;
    if(e.type==='\uC9C0\uCD9C'&&e.outAcct)allOut[e.outAcct]=(allOut[e.outAcct]||0)+e.amount;
    if(e.type==='\uC774\uB3D9'){if(e.outAcct)allOut[e.outAcct]=(allOut[e.outAcct]||0)+e.amount;if(e.inAcct)allIn[e.inAcct]=(allIn[e.inAcct]||0)+e.amount;}
  });
  return {curBal:function(k){return (init[k]||0)+(allIn[k]||0)-(allOut[k]||0);}};
}
function renderBalance(){
  var cb=calcBalances().curBal;
  var cA=ACCTS_DEF.filter(function(a){return a.group==='cash';}),dA=ACCTS_DEF.filter(function(a){return a.group==='debt';}),ldA=ACCTS_DEF.filter(function(a){return a.group==='longdebt';});
  var cT=cA.reduce(function(s,a){return s+cb(a.key);},0),dT=dA.reduce(function(s,a){return s+Math.min(0,cb(a.key));},0),ldT=ldA.reduce(function(s,a){return s+cb(a.key);},0);
  document.getElementById('bal-cash-total').textContent=fmt(cT);
  document.getElementById('bal-debt-total').textContent=fmt(Math.abs(dT));

function parseCSVLine(l){var r=[],cur='',inQ=false;for(var i=0;i<l.length;i++){if(l[i]==='"'){inQ=!inQ;}else if(l[i]===','&&!inQ){r.push(cur.trim());cur='';}else{cur+=l[i];}}r.push(cur.trim());return r;}
function parseEntryRows(rows){
  var imported=[],maxId=entries.length?Math.max.apply(null,entries.map(function(x){return typeof x.id==='number'?x.id:0;})):Date.now();
  rows.forEach(function(r){
    var o=String(r[0]||'').trim()===''&&String(r[1]||'').trim().match(/^20[0-9][0-9]/)?1:0;
    var date=String(r[o]||'').trim().replace(/\//g,'-');
    var type=String(r[o+1]||'').trim();
    var major=String(r[o+2]||'').replace(/[\x00-\x08]/g,'').trim();
    var sub=String(r[o+3]||'').replace(/[\x00-\x08]/g,'').trim();
    var memo=String(r[o+4]||'').trim();
    var amt=Math.abs(parseInt(String(r[o+5]||'0').replace(/[^0-9-]/g,''))||0);
    var inAcct=String(r[o+6]||'').trim();
    var outAcct=String(r[o+7]||'').trim();
    if(!date.match(/^20[0-9][0-9]-[0-9][0-9]-[0-9][0-9]/)||['\uC9C0\uCD9C','\uC218\uC785','\uC774\uB3D9'].indexOf(type)<0||amt===0)return;
    maxId++;imported.push({id:maxId,date:date.slice(0,10),type:type,major:major,sub:sub,memo:memo,amount:amt,inAcct:inAcct,outAcct:outAcct});
  });
  return imported;
}
function mergeImport(imported){
  if(!imported.length){showToast('\uAC00\uC838\uC62C \uB0B4\uC5ED\uC774 \uC5C6\uC5B4\uC694');return;}
  var keys=new Set(entries.map(function(x){return x.date+'|'+x.type+'|'+x.major+'|'+x.sub+'|'+x.memo+'|'+x.amount;}));
  var newOnes=imported.filter(function(x){return !keys.has(x.date+'|'+x.type+'|'+x.major+'|'+x.sub+'|'+x.memo+'|'+x.amount);});
  entries=entries.concat(newOnes);entries.sort(function(a,b){return b.date.localeCompare(a.date);});saveEntries();
  showToast(newOnes.length+'\uAC74 \uAC00\uC838\uC655\uC5B4\uC694!');
  var st=document.getElementById('setup-import-status');if(st)st.textContent='\uCD1D '+entries.length+'\uAC74 \uB85C\uB4DC\uB428';
  renderHome();var lt=localStorage.getItem('lastTab')||'home';if(lt==='history')renderHist();else if(lt==='balance')renderBalance();else if(lt==='asset')renderAsset();

function applyConfigCSV(rows){
  var cnt=0;
  rows.forEach(function(r){
    var type=String(r[0]||'').trim();
    if(type==='\uC608\uC0B0'){var cat=String(r[1]||'').trim(),amt=parseInt(String(r[2]||'0').replace(/[^0-9-]/g,''))||0;if(cat){BUDGET[cat]=amt;cnt++;}}
    else if(type==='\uCE74\uB4DC\uC608\uC0B0'){var card=String(r[1]||'').trim(),amt=parseInt(String(r[2]||'0').replace(/[^0-9-]/g,''))||0;if(card){CARD_BUDGET[card]=amt;cnt++;}}
    else if(type==='\uC800\uCD95\uBAA9\uD45C'){var n=String(r[1]||'').trim(),g=parseInt(String(r[2]||'0').replace(/[^0-9-]/g,''))||0,mk=String(r[3]||n).trim();if(n){var idx=SAVE_GOALS.findIndex(function(x){return x.n===n;});if(idx>=0)SAVE_GOALS[idx]={n:n,g:g,mk:mk};else SAVE_GOALS.push({n:n,g:g,mk:mk});cnt++;}}
    else if(type==='\uCD08\uAE30\uC7D8\uACE0'){var key=String(r[1]||'').trim(),amt=parseInt(String(r[2]||'0').replace(/[^0-9-]/g,''))||0;if(key){var d=getInitBal();d[key]=amt;try{localStorage.setItem('initBal',JSON.stringify(d));}catch(e){}cnt++;}}
  });
  try{localStorage.setItem('gb_budget',JSON.stringify(BUDGET));localStorage.setItem('gb_card_budget',JSON.stringify(CARD_BUDGET));localStorage.setItem('gb_save_goals',JSON.stringify(SAVE_GOALS));}catch(e){}
  return cnt;
}
function importFile(input){
  var file=input.files[0];if(!file)return;
  var isCSV=file.name.toLowerCase().endsWith('.csv');
  var reader=new FileReader();
  if(isCSV){
    reader.onload=function(ev){
      try{
        var text=new TextDecoder('utf-8').decode(new Uint8Array(ev.target.result));
        if(text.indexOf('\uFFFD')>=0)text=new TextDecoder('euc-kr').decode(new Uint8Array(ev.target.result));
        var lines=text.split('\n').map(function(l){return l.replace(/\r/g,'');}).filter(function(l){return l.trim();});
        var allRows=lines.map(function(l){return parseCSVLine(l);}).filter(function(r){return r.length>1;});
        var isConfig=allRows.some(function(r){return ['\uC608\uC0B0','\uCE74\uB4DC\uC608\uC0B0','\uC800\uCD95\uBAA9\uD45C','\uCD08\uAE30\uC7D8\uACE0'].indexOf(String(r[0]||'').trim())>=0;});
        if(isConfig){var cnt=applyConfigCSV(allRows);showToast('\uC124\uC815 '+cnt+'\uAC1C \uC801\uC6A9\uB410\uC5B4\uC694!');renderSetup();location.reload();return;}
        var rows=allRows.filter(function(r){var c0=String(r[0]||''),c1=String(r[1]||'');return c0.match(/^20[0-9][0-9][\/\-]/)||c1.match(/^20[0-9][0-9][\/\-]/);});
        if(!rows.length){showToast('\uB0A0\uC9DC \uD615\uC2DD\uC744 \uCC3E\uC744 \uC218 \uC5C6\uC5B4\uC694');return;}
        mergeImport(parseEntryRows(rows));
      }catch(err){showToast('CSV \uC624\uB958: '+err.message);}
    };reader.readAsArrayBuffer(file);
  }else{
    reader.onload=function(ev){
      try{
        if(typeof XLSX==='undefined'){showToast('\uC7A0\uC2DC \uD6C4 \uB2E4\uC2DC \uC2DC\uB3C4\uD574\uC8FC\uC138\uC694');return;}
        var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        var dataRows=rows.filter(function(r){return String(r[0]||'').match(/^20[0-9][0-9][\/\-]/)||String(r[1]||'').match(/^20[0-9][0-9][\/\-]/);});
        if(!dataRows.length){showToast('\uB0A0\uC9DC \uD615\uC2DD\uC744 \uCC3E\uC744 \uC218 \uC5C6\uC5B4\uC694');return;}
        mergeImport(parseEntryRows(dataRows));
      }catch(err){showToast('\uC5D1\uC140 \uC624\uB958: '+err.message);}
    };reader.readAsArrayBuffer(file);
  }
}
